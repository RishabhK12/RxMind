# One-time helper: switch Pages from legacy branch/docs to GitHub Actions.
# Run manually from Actions tab if the site still serves old content from alternate-local-llm/docs.
name: Configure Pages (Actions source)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Set Pages build type to workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method PUT "repos/${{ github.repository }}/pages" \
            -f build_type=workflow
