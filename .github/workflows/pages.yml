# Legacy GitHub Pages deploy — pushes static export to alternate-local-llm/docs.
# Does not require repo-owner "GitHub Actions" Pages source; works with branch/docs hosting.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-legacy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install and build
        working-directory: website
        env:
          # Project Pages URL: https://rishabhk12.github.io/RxMind/
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || '/RxMind' }}
          NEXT_PUBLIC_PLAY_STORE_URL: ${{ vars.NEXT_PUBLIC_PLAY_STORE_URL }}
        run: |
          npm ci
          npm run build

      - name: Prepare legacy Pages tree (docs/)
        run: |
          mkdir -p _pages/docs
          cp -r website/out/* _pages/docs/
          touch _pages/docs/.nojekyll

      - name: Publish to alternate-local-llm branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: alternate-local-llm
          folder: _pages
          clean: true
          single-commit: true
